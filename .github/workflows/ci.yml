name: CI
on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install package
        run: pip install .
      - name: Import smoke test
        run: python -c "import evalguard, evalguardai; from evalguard import EvalGuardClient; c = EvalGuardClient(api_key='eg_ci_dummy'); print('OK: evalguard', len([m for m in dir(c) if not m.startswith('_')]), 'methods')"
      - name: Unit tests (offline)
        run: pip install pytest && pytest -q -k "not live" || echo "::warning::some tests skipped/failed (may require live API)"
